name: Build OpenWrt-360-t7-108M

on:
  workflow_dispatch:
    inputs:
      devices:
        description: 'build devices'
        default: '[{"360-t7-108M"}]'
      clean:
        description: 'clean ccache'
        default: 'false'
  schedule:
    - cron: 0 8 * * 3,5
  watch:
    types: started
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-openwrt-360t7.yml'
      - '360-t7-108M.config'

env:
  REPO_URL: https://github.com/hanwckf/immortalwrt-mt798x
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 360-t7-108M.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  create-matrix:
    runs-on: ubuntu-latest
    name: Create Matrix
    steps:
      - name: Set Matrix
        id: set-matrix
        env:
          MATRIXS: ${{ github.event.inputs.devices }}
        run: |
          if [ -z $MATRIXS ]; then
            MATRIXS='["360-t7-108M"]'
          fi
          echo "matrix=$MATRIXS" >> $GITHUB_OUTPUT
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

  build:
    needs: create-matrix
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.create-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 1000

    steps:
    # ========== 1. 强力释放磁盘空间 ==========
    - name: Free disk space (aggressive)
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android
        sudo rm -rf /usr/share/leetcode /opt/hostedtoolcache
        sudo docker rmi $(docker images -q) 2>/dev/null || true
        sudo apt clean
        sudo rm -rf /home/runner/.cache /home/runner/.ccache /home/runner/.npm
        sudo rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*
        df -hT

    # ========== 2. 初始化环境（精简依赖） ==========
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt update -y
        sudo apt full-upgrade -y
        # 只安装绝对必要的包
        sudo apt install -y build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget time
        sudo apt clean
        sudo rm -rf /var/cache/apt/archives/*
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    # ========== 3. 检出代码 ==========
    - name: Checkout
      uses: actions/checkout@main

    # ========== 4. 克隆源码 ==========
    - name: Clone source code
      working-directory: ./
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    # ========== 5. 更新 feeds ==========
    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ========== 6. 复制配置文件 ==========
    - name: Copy config file
      working-directory: ./openwrt
      run: |
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        echo "CONFIG_DEVEL=y" >> .config
        echo "CONFIG_CCACHE=y" >> .config

    # ========== 7. 下载软件包 ==========
    - name: Download package
      id: package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # ========== 8. 编译固件 ==========
    - name: Compile the firmware
      id: compile
      working-directory: ./openwrt
      run: |
        echo "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # ========== 9. 检查空间使用（调试用） ==========
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    # ========== 10. 上传 bin 目录（可选） ==========
    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    # ========== 11. 整理固件文件 ==========
    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      working-directory: ./openwrt
      run: |
        cd bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    # ========== 12. 上传固件目录 ==========
    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # ========== 13. 保持运行记录（可选） ==========
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3

